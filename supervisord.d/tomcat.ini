[program:tomcat]
command=/usr/local/tomcat/bin/catalina.sh run
stdout_logfile=/usr/local/tomcat/logs/catalina.out
stderr_logfile=/usr/local/tomcat/logs/catalina.out
environment=JAVA_HOME="/usr/local/jdk",JAVA_BIN="/usr/local/jdk/bin"
autorestart=true
startsecs=60
priority=1
stopasgroup=true
killasgroup=true
